spring:
  application:
    name: cricket-analytics-platform
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/cricket_analytics}
      database: ${MONGODB_DATABASE:cricket_analytics}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

cricket:
  data:
    base-path: ${CRICKET_DATA_PATH:../cricket-data}
    mock-stream-file: ${MOCK_STREAM_FILE:mock-match-stream.json}
    sentiment-mock-file: ${SENTIMENT_MOCK_FILE:sentiment-mock.json}
    media-path: ${MEDIA_PATH:../cricket-data/media}
  
  adapters:
    mock:
      enabled: ${MOCK_ADAPTER_ENABLED:true}
    external:
      enabled: ${EXTERNAL_ADAPTER_ENABLED:false}
      api-key: ${EXTERNAL_API_KEY:}
      base-url: ${EXTERNAL_BASE_URL:}
      name: ${EXTERNAL_ADAPTER_NAME:ExternalAPI}
  
  prediction:
    service-url: ${PREDICTION_SERVICE_URL:http://localhost:8000}
    timeout-ms: ${PREDICTION_TIMEOUT_MS:5000}
    enabled: ${PREDICTION_SERVICE_ENABLED:true}



logging:
  level:
    root: INFO
    com.sportsanalytics: DEBUG
    org.springframework.web: INFO
    org.springframework.data.mongodb: INFO
    reactor.netty.http.client.HttpClient: DEBUG
    reactor.netty.http.client.HttpClientRequest: DEBUG
    reactor.netty.http.client.HttpClientResponse: DEBUG
    reactor.netty.http.client.HttpClientOperations: DEBUG
    reactor.netty.http.client.HttpClientObservations: DEBUG

